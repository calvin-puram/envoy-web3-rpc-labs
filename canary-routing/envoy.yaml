static_resources:

  listeners:
    - name: rpc_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8545

      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: rpc_ingress
                use_remote_address: true
                generate_request_id: true

                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        text_format: |
                          [%START_TIME%] status=%RESPONSE_CODE%
                          cluster=%UPSTREAM_CLUSTER%
                          upstream=%UPSTREAM_HOST%
                          duration=%DURATION%ms
                          flags=%RESPONSE_FLAGS%
                          # cluster field shows "stable" or "canary"
                          # use this to verify traffic split in logs

                stream_idle_timeout: 60s
                request_timeout: 30s

                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                route_config:
                  name: rpc_canary_route
                  virtual_hosts:
                    - name: rpc_backend
                      domains: ["*"]
                      routes:

                        # Canary Route
                        # Weighted cluster split between stable and canary.
                        # Weights are controlled by runtime keys so they can
                        # be changed without reloading config.
                        #
                        # Runtime key behaviour:
                        #   If runtime key is not set => use default weight
                        #   If runtime key IS set    => override default weight
                        - match:
                            prefix: "/"
                          route:
                            weighted_clusters:
                              clusters:

                                # Stable Cluster
                                - name: stable
                                  weight: 95



                                  # Headers added to requests going to stable.
                                  # Useful for per-cluster tracing and log correlation.
                                  request_headers_to_add:
                                    - header:
                                        key: x-deployment-version
                                        value: stable
                                      keep_empty_value: false

                                # Canary Cluster (5% default)
                                - name: canary
                                  weight: 5

                                

                                  request_headers_to_add:
                                    - header:
                                        key: x-deployment-version
                                        value: canary
                                      keep_empty_value: false

                              # Total weight must equal sum of cluster weights.
                              # Keep at 100 for intuitive percentage interpretation.
                              total_weight: 100

                            timeout: 30s
                            retry_policy:
                              retry_on: "5xx,reset,connect-failure"
                              num_retries: 2
                              per_try_timeout: 10s
                              # On retry: prefer the same cluster (stable or canary)
                              # to avoid routing a failed canary request to stable
                              # which would inflate stable's success stats.
                              retry_host_predicate:
                                - name: envoy.retry_host_predicates.previous_hosts
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.retry.host.previous_hosts.v3.PreviousHostsPredicate


  clusters:
    # Current production node. Conservative circuit breaker thresholds.
    - name: stable
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN

      health_checks:
        - timeout: 5s
          interval: 10s
          interval_jitter: 1s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: "/"

      # Production-grade thresholds stable node handles full load
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 100
            max_pending_requests: 50
            max_requests: 200
            max_retries: 10
            track_remaining: true

      outlier_detection:
        consecutive_5xx: 5
        consecutive_gateway_failure: 5
        base_ejection_time: 30s
        max_ejection_percent: 50
        interval: 10s

      load_assignment:
        cluster_name: stable
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: stable
                      port_value: 8545

    # Canary Cluster
    # New candidate node. Stricter circuit breaker thresholds to
    # limit blast radius if canary misbehaves, it cannot consume
    # more than 20% of the proxy's connection capacity.
    #
    # Lower thresholds also make problems surface faster:
    # a node that is slightly degraded will overflow its smaller
    # circuit breaker before it would overflow stable's larger one.
    - name: canary
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN

      health_checks:
        - timeout: 5s
          interval: 10s
          interval_jitter: 1s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: "/"

      # Stricter thresholds  limits blast radius during canary phase.
      # Even at 100% weight, canary cannot use more connections than
      # these thresholds allow. Adjust upward after full promotion.
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 20        # 20% of stable's capacity
            max_pending_requests: 10   # strict surface problems fast
            max_requests: 50
            max_retries: 3             # fewer retries fail fast
            track_remaining: true

      # Tighter outlier detection eject canary faster on errors.
      # Canary gets 3 strikes vs stable's 5 less tolerance for
      # misbehaviour during the evaluation window.
      outlier_detection:
        consecutive_5xx: 3             # faster ejection than stable (5)
        consecutive_gateway_failure: 3
        base_ejection_time: 30s
        max_ejection_percent: 100      # allow full ejection of canary
        interval: 10s

      load_assignment:
        cluster_name: canary
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: canary
                      port_value: 8545

layered_runtime:
  layers:
    # Disk layer persistent overrides survive Envoy restarts
    - name: disk_layer
      disk_layer:
        symlink_root: /srv/runtime
        subdirectory: ""

    # Admin layer in-memory overrides via /runtime_modify
    # Takes precedence over disk layer
    - name: admin_layer
      admin_layer: {}


admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
  access_log:
    - name: envoy.access_loggers.stdout
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog