services:
  envoy:
    image: envoyproxy/envoy:v1.29-latest
    container_name: envoy-fault-injection
    restart: unless-stopped
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8545:8545"
      - "9901:9901"
    command:
      - /usr/local/bin/envoy
      - -c /etc/envoy/envoy.yaml
      - --log-level info
      - --component-log-level http:debug,router:info
    depends_on:
      node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Ethereum Node
  # Single node: fault injection happens at the proxy layer, not the
  # node layer. The node stays healthy throughout all experiments.
  # Direct port exposed to verify the node returns 200 without faults,
  # confirming that any errors observed via Envoy are injected.
  node1:
    image: ethereum/client-go:stable
    container_name: eth-node-fault-1
    restart: unless-stopped
    command:
      - --dev
      - --dev.period=1
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=eth,web3,net,debug
      - --http.corsdomain=*
      - --http.vhosts=*
      - --verbosity=3
    ports:
      - "18545:8545"    # direct access no faults, use as control group
    volumes:
      - node1-data:/root/.ethereum
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - |
          wget -qO- \
          --post-data='{"jsonrpc":"2.0","method":"net_listening","params":[],"id":1}' \
          --header='Content-Type: application/json' \
          http://localhost:8545 | grep -q '"result":true'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Prometheus: Fault Impact Monitoring
  # Essential for fault injection testing: lets you see the exact impact
  # of each fault on error rate, latency p99, and retry rate over time.
  # Without this, you are guessing whether your resilience mechanisms
  # are actually responding to the injected faults.
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus-fault
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=2d
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  node1-data:
    driver: local
  prometheus-data:
    driver: local

networks:
  default:
    name: envoy-fault-injection-network
    driver: bridge