static_resources:

  listeners:
    - name: rpc_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8545

      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: rpc_ingress
                use_remote_address: true
                generate_request_id: true

                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        text_format: |
                          [%START_TIME%] status=%RESPONSE_CODE%
                          flags=%RESPONSE_FLAGS%
                          duration=%DURATION%ms
                          upstream=%UPSTREAM_HOST%
                          request_id=%REQ(X-REQUEST-ID)%
                          # FI = fault injected (latency or abort)
                          # FI appears in RESPONSE_FLAGS when a fault fired

                stream_idle_timeout: 60s
                request_timeout: 30s

                http_filters:

                  # Fault Injection Filter
                  # MUST be listed before envoy.filters.http.router.
                  # The per-route fault config (typed_per_filter_config)
                  # on each route overrides these global defaults.
                  #
                  # Global defaults defined here:
                  #   delay: 2000ms, 0% (off by default, runtime-toggled)
                  #   abort: HTTP 503, 0% (off by default, runtime-toggled)
                  - name: envoy.filters.http.fault
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.fault.v3.HTTPFault

                      # Latency Fault
                      delay:
                        fixed_delay: 2s

                        percentage:
                          # 0% default  faults are off at startup.
                          # Runtime key overrides this without restart.
                          numerator: 0
                          denominator: HUNDRED

                        # Runtime key  controls latency fault percentage live.
                        # POST /runtime_modify fault.http.delay.fixed_delay_percent=50
                        # sets 50% of requests to receive the 2s delay.
                      delay_percent_runtime: fault.http.delay.fixed_delay_percent

                      # Abort Fault
                      abort:
                        # HTTP status code returned for aborted requests.
                        # 503 = Service Unavailable — realistic for a degraded node.
                        # Use 429 to simulate rate limiting, 504 for gateway timeout.
                        http_status: 503

                        percentage:
                          numerator: 0
                          denominator: HUNDRED

                        # Runtime key  controls abort fault percentage live.
                        # POST /runtime_modify fault.http.abort.abort_percent=10

                      abort_percent_runtime: fault.http.abort.abort_percent

                      # Upstream Cluster Scope
                      # Restrict this fault filter to a specific upstream cluster.
                      # Without this, faults apply to ALL clusters.
                      # Useful when multiple clusters exist and you want to fault
                      # only the RPC cluster, not e.g. a tracing or metrics cluster.
                      upstream_cluster: ethereum_nodes

                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                route_config:
                  name: rpc_fault_route
                  virtual_hosts:
                    - name: rpc_backend
                      domains: ["*"]
                      routes:

                        # Health Check Route (never faulted)
                        # Liveness probes must not be faulted if they are,
                        # orchestrators will restart healthy containers.
                        # This route bypasses the fault filter entirely.
                        - match:
                            prefix: "/health"
                          route:
                            cluster: ethereum_nodes
                            timeout: 5s
                          typed_per_filter_config:
                            envoy.filters.http.fault:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.fault.v3.HTTPFault
                              # Empty fault config on this route = no faults
                              # Overrides the global fault filter for /health

                        # Heavy RPC Route (eth_getLogs)
                        # eth_getLogs is the most expensive RPC method.
                        # This route targets requests with x-rpc-method: eth_getLogs
                        # header and injects a longer delay with an independent
                        # runtime key  lets you fault expensive methods separately
                        # from fast methods like eth_blockNumber.
                        #
                        # Enable:
                        #   curl -X POST http://localhost:9901/runtime_modify \
                        #     --data "fault.http.getlogs.delay_percent=100"
                        - match:
                            prefix: "/"
                            headers:
                              - name: x-rpc-method
                                string_match:
                                  exact: eth_getLogs
                          route:
                            cluster: ethereum_nodes
                            timeout: 30s
                          typed_per_filter_config:
                            envoy.filters.http.fault:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.fault.v3.HTTPFault
                              delay:
                                # 3s delay on eth_getLogs  realistic for a node
                                # struggling with a large log range scan
                                fixed_delay: 3s
                                percentage:
                                  numerator: 0
                                  denominator: HUNDRED
                                # Independent runtime key for eth_getLogs only
                              delay_percent_runtime: fault.http.getlogs.delay_percent
                              
                              abort:
                                http_status: 503
                                percentage:
                                  numerator: 0
                                  denominator: HUNDRED
                              abort_percent_runtime: fault.http.getlogs.abort_percent

                        # Global RPC Route
                        # Catch all for all other RPC methods.
                        # Uses the global fault filter config defined above.
                        # Fault percentages controlled by:
                        #   fault.http.delay.fixed_delay_percent
                        #   fault.http.abort.abort_percent
                        - match:
                            prefix: "/"
                          route:
                            cluster: ethereum_nodes
                            timeout: 30s
                            retry_policy:
                              # Retries are intentional here they let you observe
                              # whether retry logic absorbs injected faults or
                              # whether faults still surface to the client after retries.
                              # Watch upstream_rq_retry counter during fault injection.
                              retry_on: "5xx,reset,connect-failure"
                              num_retries: 2
                              per_try_timeout: 10s
                              retry_host_predicate:
                                - name: envoy.retry_host_predicates.previous_hosts
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.retry.host.previous_hosts.v3.PreviousHostsPredicate


  clusters:
    - name: ethereum_nodes
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN

      health_checks:
        - timeout: 5s
          interval: 10s
          interval_jitter: 1s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: "/"

      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 100
            max_pending_requests: 50
            max_requests: 200
            max_retries: 10
            track_remaining: true

      load_assignment:
        cluster_name: ethereum_nodes
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: node1
                      port_value: 8545


layered_runtime:
  layers:
    - name: admin_layer
      admin_layer: {}


admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
  access_log:
    - name: envoy.access_loggers.stdout
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog