static_resources:
  listeners:
    - name: rpc_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8545
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: rpc_ingress
                use_remote_address: true
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        text_format: |
                          [%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%"
                          status=%RESPONSE_CODE% upstream=%UPSTREAM_HOST%
                          duration=%DURATION%ms rx=%REQUEST_DURATION%ms


                stream_idle_timeout: 300s
                request_timeout: 30s

                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                route_config:
                  name: rpc_route
                  virtual_hosts:
                    - name: rpc_backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: ethereum_nodes
                            timeout: 30s
                            retry_policy:
                              retry_on: "5xx,reset,connect-failure,retriable-4xx"
                              num_retries: 3
                              per_try_timeout: 10s
                              retry_host_predicate:
                                - name: envoy.retry_host_predicates.previous_hosts
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.retry.host.previous_hosts.v3.PreviousHostsPredicate
                              host_selection_retry_max_attempts: 3


  clusters:
    - name: ethereum_nodes
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      health_checks:
        - timeout: 5s
          interval: 10s
          interval_jitter: 1s           # avoid thundering herd
          unhealthy_threshold: 3        # 3 consecutive failures = unhealthy
          healthy_threshold: 2          # 2 consecutive successes = healthy again
          no_traffic_interval: 60s      # check interval when no traffic
          http_health_check:
            path: "/"
            method: POST
            request_headers_to_add:
              - header:
                  key: Content-Type
                  value: application/json
            codec_client_type: HTTP1

      # Circuit breaker thresholds — prevent cascade failures
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 100
            max_pending_requests: 100
            max_requests: 1000
            max_retries: 10

      load_assignment:
        cluster_name: ethereum_nodes
        endpoints:
          - lb_endpoints:


              - endpoint:
                  address:
                    socket_address:
                      address: node1
                      port_value: 8545
                  health_check_config:
                    port_value: 8545


              - endpoint:
                  address:
                    socket_address:
                      address: node2
                      port_value: 8545
                  health_check_config:
                    port_value: 8545


admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
  access_log:
    - name: envoy.access_loggers.stdout
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog